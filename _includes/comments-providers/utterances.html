<script>
  'use strict';

  (function() {
    var commentContainer = document.querySelector('#utterances-comments');

    if (!commentContainer) {
      return;
    }

    // 현재 적용 테마(수동 토글 또는 시스템 설정)에 맞춰 댓글 테마를 결정
    var storedTheme;
    try { storedTheme = localStorage.getItem('theme'); } catch (e) { storedTheme = null; }
    var isDark = storedTheme === 'dark' ||
      (storedTheme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);

    var script = document.createElement('script');
    script.setAttribute('src', 'https://utteranc.es/client.js');
    script.setAttribute('repo', '{{ site.repository }}');
    script.setAttribute('issue-term', '{{ site.comments.utterances.issue_term | default: "pathname" }}');
    {% if site.comments.utterances.label %}script.setAttribute('label', '{{ site.comments.utterances.label }}');{% endif %}
    script.setAttribute('theme', isDark ? 'github-dark' : 'github-light');
    script.setAttribute('crossorigin', 'anonymous');

    commentContainer.appendChild(script);
  })();
</script>
