<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
    <h2 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h2>
  {% endif %}

  <button type="button" class="btn btn--copy-url" data-copied-label="복사 완료!" onclick="var b=this;navigator.clipboard.writeText('{{ page.url | absolute_url }}').then(function(){var t=b.querySelector('span');if(!b.dataset.label){b.dataset.label=t.textContent;}t.textContent=' '+b.dataset.copiedLabel;b.classList.add('copied');setTimeout(function(){t.textContent=b.dataset.label;b.classList.remove('copied');},2000);});"><i class="fas fa-fw fa-link" aria-hidden="true"></i><span> URL 복사</span></button>

  <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}" class="btn btn--twitter" onclick="window.open(this.href, 'window', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="X(트위터)에 공유"><i class="fab fa-fw fa-twitter" aria-hidden="true"></i><span> X</span></a>

  <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url | url_encode }}" class="btn btn--linkedin" onclick="window.open(this.href, 'window', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="LinkedIn에 공유"><i class="fab fa-fw fa-linkedin" aria-hidden="true"></i><span> LinkedIn</span></a>
</section>
